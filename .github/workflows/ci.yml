name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check src/ api/ tests/ || true

      - name: Run unit tests (no model needed)
        run: |
          pytest tests/test_business_score.py tests/test_preprocessing.py -v

      - name: Run API tests (uses committed best_model.joblib)
        if: hashFiles('models/best_model.joblib') != ''
        run: |
          pytest tests/test_api.py -v

  docker-build:
    name: Docker build (API)
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push, build verification only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: false
          load: true
          tags: credit-scoring-api:ci

      - name: Smoke test container
        run: |
          docker run -d --name ci-api -p 8000:8000 credit-scoring-api:ci
          # Wait for healthy
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "API is up"
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8000/health | tee /dev/stderr | grep -q '"status":"healthy"'
          docker rm -f ci-api
