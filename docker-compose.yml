# =============================================================================
# Credit Scoring MLOps — local infrastructure
# Services:
#   - postgres : backend store for MLflow (runs, params, metrics, model registry)
#   - mlflow   : tracking server, UI on http://localhost:5050
# Later: api (FastAPI) and streamlit will be added once code exists.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mlops_net

  mlflow:
    build:
      context: ./infra/mlflow
      dockerfile: Dockerfile
    image: credit-scoring/mlflow:2.17.2
    container_name: mlflow-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:5000"  # host:container — 5050 on Mac (5000 is taken by AirPlay)
    environment:
      BACKEND_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: >
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    networks:
      - mlops_net

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: credit-scoring-api:latest
    container_name: scoring-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /app/models/best_model.joblib
      METADATA_PATH: /app/models/metadata.json
      PORT: "8000"
    networks:
      - mlops_net

  streamlit:
    build:
      context: .
      dockerfile: streamlit_app/Dockerfile
    image: credit-scoring-ui:latest
    container_name: scoring-ui
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      # Use Docker network name (api), not localhost
      API_URL: http://api:8000
    networks:
      - mlops_net

volumes:
  postgres_data:
  mlflow_artifacts:

networks:
  mlops_net:
    driver: bridge
